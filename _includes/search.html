<!-- Search -->
<div class="search-page">
  <div class="search-icon-close-container">
    <span class="search-icon-close">
      <i class="fa fa-chevron-down"></i>
    </span>
  </div>
  <div class="search-main container">
    <div class="tech-search-panel">
      <h2>Search</h2>
      <p>输入关键词，快速检索站内文章</p>
      <form class="tech-search-form" action="javascript:void(0)">
        <input type="text" id="search-input" placeholder="Search posts, tags, topics...">
      </form>
      <div id="search-results" class="mini-post-list"></div>
    </div>
  </div>
</div>
